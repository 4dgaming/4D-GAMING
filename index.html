<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4D • GAMING</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#090909;
background-image:
radial-gradient(circle at top,#400000 0%,transparent 40%),
url("https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-attachment:fixed;
color:white;
text-align:center;
overflow-x:hidden;
}

.overlay{
background:rgba(0,0,0,.75);
min-height:100vh;
padding:40px 20px;
}

.logo{
width:220px;
border-radius:20px;
box-shadow:0 0 40px red;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
50%{transform:translateY(-10px);}
}

h1{
margin-top:20px;
font-size:55px;
color:white;
text-shadow:0 0 20px red;
}

p{
margin-top:10px;
font-size:20px;
color:#ddd;
}

.buttons{
margin-top:60px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
max-width:900px;
margin-left:auto;
margin-right:auto;
}

.btn{
padding:18px;
border-radius:15px;
font-size:22px;
font-weight:bold;
text-decoration:none;
color:white;
transition:.3s;
border:2px solid red;
background:rgba(255,255,255,.05);
backdrop-filter:blur(8px);
}

.btn:hover{
transform:scale(1.06);
box-shadow:0 0 25px red;
background:red;
}

.btn i{
margin-right:10px;
}

footer{
margin-top:80px;
color:#888;
font-size:15px;
}

</style>

</head>

<body>

<div class="overlay">

<img class="logo"
src="https://i.imgur.com/F0JwV5o.png">

<h1>4D • GAMING</h1>

<p>Willkommen beim offiziellen 4D Gaming Team</p>

<div class="buttons">

<a class="btn"
href="https://www.tiktok.com/@4dgaming">
<i class="fab fa-tiktok"></i>TikTok</a>

<a class="btn"
href="https://instagram.com/4d_gaming">
<i class="fab fa-instagram"></i>Instagram</a>

<a class="btn"
href="https://t.me/">
<i class="fab fa-telegram"></i>Telegram</a>

<a class="btn"
href="https://youtube.com/">
<i class="fab fa-youtube"></i>YouTube</a>

<a class="btn"
href="https://discord.gg/">
<i class="fab fa-discord"></i>Discord</a>

</div>

<footer>

© 2026 4D • GAMING

</footer>

</div>

</body>
</html>
